<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --brand:#2D6B8A;
  --brand-mid:#4FA3CC;
  --brand-light:#7BBEDD;
  --honey:#E8A840;
  --honey-light:#F0C060;
  --honey-pale:#FDF6E8;
  --bg:#F0F7FA;
  --bg-card:#ffffff;
  --bg-muted:#E4EFF5;
  --rule:#B8D4E0;
  --ink:#1A2830;
  --ink-light:#4A6070;
  --soft:#7A9BAD;
}
body{
  font-family:'Quicksand',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── Header ── */
header{
  background:var(--brand);
  padding:0 32px;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.hd-left{display:flex;align-items:baseline;gap:10px;}
.hd-wordmark{
  font-family:'Josefin Sans',sans-serif;
  font-size:11px;
  font-weight:600;
  letter-spacing:4px;
  color:rgba(240,247,250,0.45);
  text-transform:uppercase;
}
.hd-divider{width:1px;height:14px;background:rgba(240,247,250,0.2);margin:0 2px;}
.hd-product{
  font-family:'Josefin Sans',sans-serif;
  font-size:22px;
  font-weight:600;
  letter-spacing:1px;
  color:#F0F7FA;
}
.hd-product em{color:var(--honey-light);font-style:normal;}
.hd-right{
  font-family:'Josefin Sans',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  color:rgba(240,247,250,0.3);
  text-transform:uppercase;
}

/* ── Layout ── */
main{flex:1;display:flex;justify-content:center;padding:44px 20px 64px;}
.card{
  background:var(--bg-card);
  border-radius:20px;
  box-shadow:0 2px 32px rgba(45,107,138,0.10),0 1px 4px rgba(45,107,138,0.06);
  padding:40px 44px;
  width:100%;
  max-width:560px;
  height:fit-content;
}

/* ── Progress ── */
.progress{display:flex;gap:5px;margin-bottom:36px;}
.pdot{flex:1;height:3px;border-radius:2px;background:var(--rule);transition:background .3s;}
.pdot.done{background:var(--brand-mid);}
.pdot.active{background:var(--honey);}

/* ── Step copy ── */
.step-label{
  font-family:'Josefin Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:2.5px;
  color:var(--soft);text-transform:uppercase;margin-bottom:6px;
}
.step-title{
  font-family:'Josefin Sans',sans-serif;
  font-size:26px;font-weight:600;letter-spacing:.5px;
  color:var(--brand);margin-bottom:8px;line-height:1.2;
}
.step-title em{color:var(--honey);font-style:normal;}
.step-desc{font-size:13.5px;font-weight:400;color:var(--ink-light);line-height:1.7;margin-bottom:28px;}

/* ── Form ── */
.field{margin-bottom:20px;}
.field label{
  display:block;font-family:'Josefin Sans',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--brand);margin-bottom:6px;
}
.field .hint{font-size:12px;color:var(--soft);margin-top:4px;}
input[type=text],input[type=date],input[type=time]{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--rule);border-radius:10px;
  font-family:'Quicksand',sans-serif;font-size:14px;font-weight:500;
  background:var(--bg);color:var(--ink);
  transition:border-color .2s,background .2s;
}
input:focus{outline:none;border-color:var(--brand-mid);background:#fff;box-shadow:0 0 0 3px rgba(79,163,204,.12);}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.day-label{
  font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);
  text-align:center;margin-bottom:4px;
}

.appt-block{
  background:var(--bg);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;
  border:1.5px solid var(--rule);
}
.appt-num{
  font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--brand-mid);margin-bottom:10px;
}

/* ── Nav ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1.5px solid var(--rule);}
.btn{
  padding:10px 22px;border-radius:10px;
  font-family:'Josefin Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;
  border:1.5px solid var(--rule);background:transparent;color:var(--ink-light);transition:all .15s;
}
.btn:hover{background:var(--bg-muted);border-color:var(--brand-light);}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn-primary:hover{background:var(--brand-mid);border-color:var(--brand-mid);}
.btn-dl{
  background:var(--honey);color:#fff;border:none;
  font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;padding:14px 36px;border-radius:12px;cursor:pointer;
  transition:background .15s;
}
.btn-dl:hover{background:var(--honey-light);}

/* ── Done page ── */
.done-card{
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-mid) 100%);
  border-radius:16px;padding:28px 24px;text-align:center;margin-bottom:22px;
}
.done-card h3{font-family:'Josefin Sans',sans-serif;font-size:22px;font-weight:600;letter-spacing:.5px;color:#fff;margin:10px 0 8px;}
.done-card p{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7;}
.instr{background:var(--bg);border-radius:12px;border:1.5px solid var(--rule);padding:16px 20px;margin-bottom:12px;}
.instr h4{font-family:'Josefin Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--brand);margin-bottom:10px;}
.instr ol{padding-left:18px;}
.instr li{font-size:13px;color:var(--ink-light);line-height:1.9;}
.instr li strong{color:var(--ink);font-weight:600;}

.info-box{
  background:var(--honey-pale);border-left:3px solid var(--honey);
  border-radius:0 10px 10px 0;padding:12px 14px;
  font-size:12.5px;color:var(--ink-light);line-height:1.65;margin-top:10px;
}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(232,168,64,0.12);border:1px solid rgba(232,168,64,0.35);
  color:var(--brand);font-family:'Josefin Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;margin-bottom:20px;
}

/* ── Footer ── */
footer{background:var(--brand);padding:13px 32px;text-align:center;}
footer p{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(240,247,250,0.3);}
footer span{color:var(--honey-light);}
</style>
</head>

    const on='background:#2D6B8A;color:#F0F7FA;border-color:#2D6B8A;';
    const off='background:#fff;color:#2D6B8A;border-color:#B8D4E0;';
    reg.style.cssText=reg.style.cssText.replace(/background:[^;]+;color:[^;]+;border-color:[^;]+;/,'')+( s==='regular'?on:off);
    lg.style.cssText=lg.style.cssText.replace(/background:[^;]+;color:[^;]+;border-color:[^;]+;/,'')+( s==='large'?on:off);
  }
}
function openP(){pop();document.getElementById('cfg-panel').classList.add('open');}
function closeP(){document.getElementById('cfg-panel').classList.remove('open');}
function pop(){
  setSize(C.textSize||'regular');
  document.getElementById('pn').value=C.displayName||'';
  document.getElementById('pz').value=C.zip||'';
  [0,1,2,3,4,5,6].forEach(i=>{const el=document.getElementById('c'+i);if(el)el.value=(C.caregivers&&C.caregivers[i])||'';});
  document.getElementById('cn').value=C.nightCaregiver||'';
  document.getElementById('ma').value=C.medMorning||'08:00';
  document.getElementById('mp').value=C.medAfternoon||'13:00';
  document.getElementById('me').value=C.medEvening||'18:00';
  rApts(C.appts||[]);
}
function rApts(a){
  const c=document.getElementById('pa');c.innerHTML='';
  const l=a.length?a:[{date:'',time:'',text:''}];
  l.forEach((x,i)=>{
    const div=document.createElement('div');div.className='ca';
    div.innerHTML='<div class="can">Appointment '+(i+1)+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">'
      +'<div><label style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#7A9BAD;display:block;margin-bottom:2px;">Date</label><input type="date" id="ad'+i+'" value="'+(x.date||'')+'" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;"></div>'
      +'<div><label style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#7A9BAD;display:block;margin-bottom:2px;">Time</label><input type="time" id="at'+i+'" value="'+(x.time||'')+'" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;"></div>'
      +'</div><input type="text" id="ax'+i+'" value="'+(x.text||'')+'" placeholder="e.g. Dr. Reilly at 3 PM" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;">';

function addA(){
  const n=document.querySelectorAll('.ca').length;
  const c=document.getElementById('pa');
  const div=document.createElement('div');div.className='ca';
  div.innerHTML='<div class="can">Appointment '+(n+1)+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">'
    +'<div><label style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#7A9BAD;display:block;margin-bottom:2px;">Date</label><input type="date" id="ad'+n+'" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;"></div>'
    +'<div><label style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#7A9BAD;display:block;margin-bottom:2px;">Time</label><input type="time" id="at'+n+'" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;"></div>'
    +'</div><input type="text" id="ax'+n+'" placeholder="e.g. Dr. Reilly at 3 PM" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;">';

}
function saveP(){
  C.displayName=document.getElementById('pn').value||'';
  C.zip=document.getElementById('pz').value||'';
  C.caregivers=[0,1,2,3,4,5,6].map(i=>{const el=document.getElementById('c'+i);return el?el.value:'';});
  C.nightCaregiver=document.getElementById('cn').value||'';
  C.medMorning=document.getElementById('ma').value||'08:00';
  C.medAfternoon=document.getElementById('mp').value||'13:00';
  C.medEvening=document.getElementById('me').value||'18:00';
  // textSize is set live via setSize(), already in C
  const n=document.querySelectorAll('.ca').length;
  C.appts=Array.from({length:n},(_,i)=>({date:(document.getElementById('ad'+i)||{}).value||'',time:(document.getElementById('at'+i)||{}).value||'',text:(document.getElementById('ax'+i)||{}).value||''})).filter(a=>a.date&&a.text);
  try{localStorage.setItem('luv_cfg',JSON.stringify(C));}catch(e){}
  closeP();genR();dispCG();updW();
}
const DS=8,ES=18,NS=21,FD=3;
let AR=[],AF=null,LR=Date.now();
function uMode(){const h=new Date().getHours(),b=document.body;b.classList.remove('day-mode','evening-mode','night-mode');h>=DS&&h<ES?b.classList.add('day-mode'):h>=ES&&h<NS?b.classList.add('evening-mode'):b.classList.add('night-mode');}
function uTime(){const n=new Date();document.getElementById('time').textContent=n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});document.getElementById('date').textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});uMode();dispCG();chkR();if(window.wc!==undefined)document.getElementById('wi').textContent=wInfo(window.wc).icon;}
async function updW(){try{const g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(C.zip||'20904')+'&count=1&language=en&format=json');const gd=await g.json();if(gd.results&&gd.results.length>0){const{latitude:la,longitude:lo}=gd.results[0];const w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto');const wd=await w.json();document.getElementById('temp').textContent=Math.round(wd.current.temperature_2m)+'°F';const wi=wInfo(wd.current.weather_code);document.getElementById('wi').textContent=wi.icon;document.getElementById('wd').textContent=wi.description;window.wc=wd.current.weather_code;}}catch(e){document.getElementById('wd').textContent='Weather unavailable';}}
function wInfo(code){const isN=new Date().getHours()>=20||new Date().getHours()<6;const m={0:{icon:isN?'🌙':'☀️',description:'Clear sky'},1:{icon:isN?'🌙':'🌤️',description:'Mainly clear'},2:{icon:isN?'☁️':'⛅',description:'Partly cloudy'},3:{icon:'☁️',description:'Overcast'},45:{icon:'🌫️',description:'Foggy'},51:{icon:'🌦️',description:'Light drizzle'},61:{icon:'🌧️',description:'Light rain'},63:{icon:'🌧️',description:'Rain'},65:{icon:'🌧️',description:'Heavy rain'},71:{icon:'🌨️',description:'Light snow'},73:{icon:'🌨️',description:'Snow'},80:{icon:'🌦️',description:'Showers'},95:{icon:'⛈️',description:'Thunderstorm'}};return m[code]||{icon:isN?'🌙':'🌤️',description:'Unknown'};}
function genR(){AR=[];const today=new Date(),dow=today.getDay(),ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');(C.appts||[]).forEach(e=>{if(e.date===ds&&e.text)AR.push({time:e.time||'09:00',text:e.text,featured:true,icon:'📋',sch:true});});if(dow===0)AR.push({time:'10:30',text:'Sunday morning',featured:false,icon:'☀️',sch:true});[{t:C.medMorning||'08:00',x:'Morning medication'},{t:C.medAfternoon||'13:00',x:'Afternoon medication'},{t:C.medEvening||'18:00',x:'Evening medication'}].forEach(r=>AR.push({time:r.t,text:r.x,featured:true,icon:'💊',sch:false}));[{iv:60,s:'11:00',e:'17:00',x:'Take a drink of water',icon:'💧'},{iv:135,s:'12:45',e:'17:45',x:'Move your arms and legs',icon:'🤸'}].forEach(r=>{const[sh,sm]=r.s.split(':').map(Number);const[eh,em]=r.e.split(':').map(Number);for(let m=sh*60+sm;m<=eh*60+em;m+=r.iv)AR.push({time:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'),text:r.x,featured:true,icon:r.icon,sch:false});});AR.sort((a,b)=>a.time.localeCompare(b.time));dispR();dispS();}
function dispCG(){const now=new Date(),h=now.getHours(),dow=now.getDay();let name='',isN=h>=19||h<7;const heart=h>=8&&h<18?'💙':h>=18&&h<21?'💚':'❤️';if(isN){let nd=dow;if(h<7){const y=new Date(now);y.setDate(y.getDate()-1);nd=y.getDay();}name=C.nightCaregiver||'';}else{name=(C.caregivers&&C.caregivers[dow])||'';}const el=document.getElementById('cgn');el.innerHTML=name?name+' is here '+(isN?'tonight':'today')+' '+heart:'';el.style.display=name?'block':'none';}
function dispR(){const now=new Date(),ct=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');const el=document.getElementById('rl');el.innerHTML='';const items=AR.filter(r=>r.sch);if(!items.length){el.innerHTML='<div class="reminder-item">Nothing scheduled today</div>';return;}items.forEach(r=>{const d=document.createElement('div');d.className='reminder-item';if(r.time<ct)d.classList.add('past-event');d.innerHTML='<span class="reminder-time">'+r.icon+' '+f12(r.time)+'</span><span>'+r.text+'</span>';el.appendChild(d);});}
function dispS(){const today=new Date(),dow=today.getDay(),mo=today.getMonth()+1,dy=today.getDate(),h=today.getHours();const el=document.getElementById('sl');el.innerHTML='';let all=[];const hol=HOLS.find(x=>x.m===mo&&x.d===dy);if(hol)all.push({text:hol.t,icon:hol.e,color:(h>=21||h<8)?'#666':hol.c,isH:true});all.push({text:'Remember to breathe deeply',icon:'🧘'});if(dow===1||dow===4)all.push({text:'Call a friend?',icon:'💬'});all.slice(0,3).forEach(s=>{const d=document.createElement('div');d.className='reminder-item';const cs=s.isH?'style="color:'+s.color+';"':'';d.innerHTML='<span '+cs+'>'+s.icon+' '+s.text+'</span>';el.appendChild(d);});}
function f12(t){const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM');}
function chkR(){if(AF)return;const ct=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');const fr=AR.find(r=>r.time===ct&&r.featured);if(fr)showF(fr);}
function chime(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(800,ac.currentTime);o.frequency.exponentialRampToValueAtTime(400,ac.currentTime+0.3);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.3);o.start(ac.currentTime);o.stop(ac.currentTime+0.3);}catch(e){}}
async function showF(r){AF=r;const ov=document.getElementById('fo');document.getElementById('fi').textContent=r.icon;document.getElementById('ft').textContent=f12(r.time);document.getElementById('fx').textContent=r.text;ov.classList.add('active');chime();setTimeout(()=>{ov.classList.remove('active');AF=null;dispR();},FD*60*1000);}
function chkRefresh(){const now=new Date(),h=now.getHours(),m=now.getMinutes();if(h===0&&m===0&&!AF){location.reload();return;}if(h>=8&&h<22&&Date.now()-LR>=15*60*1000&&!AF){LR=Date.now();location.reload();}}
function init(){uTime();updW();genR();dispCG();
  document.body.classList.toggle('large-print',(C.textSize||'regular')==='large');
  setInterval(uTime,1000);setInterval(chkRefresh,60000);setInterval(updW,30*60*1000);setInterval(()=>{if(new Date().getHours()===0&&new Date().getMinutes()===0)genR();},60000);}
window.addEventListener('load',init);
<\/script></body></html>`;
}

function render(){
  const app=document.getElementById('app');
  const dots=Array.from({length:TOTAL},(_,i)=>`<div class="pdot ${i+1<step?'done':i+1===step?'active':''}"></div>`).join('');
  let c='';

  if(step===1){c=`
    <div class="step-label">Step 1 of ${TOTAL}</div>
    <div class="step-title">About your loved one</div>
    <div class="step-desc">This personalizes the display. Zip code pulls live weather automatically every 30 minutes.</div>
    <div class="pill">✦ Built-in settings panel — update anytime, no code required</div>
    <div class="field"><label>What should the display call them?</label><input type="text" id="fn" value="${data.displayName}" placeholder="Mom, Dorothy, Grandpa Joe"/><div class="hint">Appears in the caregiver greeting</div></div>
    <div class="field"><label>Home zip code</label><input type="text" id="fz" value="${data.zip}" placeholder="20904" maxlength="5"/></div>`;}

  if(step===2){
    const wk=[1,2,3,4,5].map(i=>`<div><div class="day-label">${DAYS[i]}</div><input type="text" id="fc${i}" value="${data.caregivers[i]}" placeholder="Name" style="text-align:center;padding:8px 4px;"/></div>`).join('');
    const we=[6,0].map(i=>`<div><div class="day-label">${DAYS[i]}</div><input type="text" id="fc${i}" value="${data.caregivers[i]}" placeholder="Name" style="text-align:center;padding:8px 4px;"/></div>`).join('');
    c=`
    <div class="step-label">Step 2 of ${TOTAL}</div>
    <div class="step-title">Caregiver schedule</div>
    <div class="step-desc">The display shows the right name automatically by day. Switches to the night caregiver at 7 PM.</div>
    <div class="field"><label>Weekday</label><div class="grid5">${wk}</div></div>
    <div class="field"><label>Weekend</label><div class="grid2">${we}</div></div>
    <div class="field"><label>Night caregiver (all nights)</label><input type="text" id="fni" value="${data.nightCaregiver}" placeholder="Overnight caregiver name"/></div>`;}

  if(step===3){c=`
    <div class="step-label">Step 3 of ${TOTAL}</div>
    <div class="step-title">Medication times</div>
    <div class="step-desc">At each time, a full-screen reminder appears with a gentle chime. Match these to your actual schedule.</div>
    <div class="grid3">
      <div class="field"><label>Morning</label><input type="time" id="fma" value="${data.medMorning}"/></div>
      <div class="field"><label>Afternoon</label><input type="time" id="fmp" value="${data.medAfternoon}"/></div>
      <div class="field"><label>Evening</label><input type="time" id="fme" value="${data.medEvening}"/></div>
    </div>
    <div class="info-box">Water reminders every hour and movement prompts every 2 hours are included automatically. Adjust these anytime from the settings panel inside your downloaded file.</div>`;}

  if(step===4){
    const af=data.appts.map((a,i)=>`
    <div class="appt-block">
      <div class="appt-num">Appointment ${i+1}${a.text?' — '+a.text.slice(0,28)+(a.text.length>28?'…':''):''}</div>
      <div class="grid2" style="margin-bottom:10px;">
        <div class="field" style="margin-bottom:0;"><label>Date</label><input type="date" id="fad${i}" value="${a.date}"/></div>
        <div class="field" style="margin-bottom:0;"><label>Time</label><input type="time" id="fat${i}" value="${a.time}"/></div>
      </div>
      <div class="field" style="margin-bottom:0;"><label>Description</label><input type="text" id="fax${i}" value="${a.text}" placeholder="e.g. Dr. Reilly follow-up at 3:00 PM"/></div>
    </div>`).join('');
    c=`
    <div class="step-label">Step 4 of ${TOTAL}</div>
    <div class="step-title">Upcoming appointments</div>
    <div class="step-desc">These appear in the schedule and pop up full-screen at start time. Add more anytime from the settings panel inside the display.</div>
    ${af}`;}

  if(step===5){
    const n=data.displayName||'your loved one';
    const slug=(data.displayName||'display').toLowerCase().replace(/\s+/g,'-');
    c=`
    <div class="done-card">
      <div style="font-size:40px;">💙</div>
      <h3>Ready for ${n}</h3>
      <p>Your MemoryLUV display is personalized and ready.<br>Open in any browser, cast or mirror to a TV or monitor.</p>
    </div>
    <div class="instr"><h4>First-time setup</h4><ol>
      <li>Click Download — save the <strong>.html file</strong> anywhere on your computer</li>
      <li>Double-click it to open in Chrome or Edge</li>
      <li>Press <strong>F11</strong> (PC) or <strong>⌘ Ctrl F</strong> (Mac) for full screen</li>
      <li>Cast or mirror to your TV or monitor — runs and updates automatically 24/7</li>
    </ol></div>
    <div class="instr"><h4>Updating settings or adding appointments</h4><ol>
      <li>Click the <strong>⚙ button</strong> in the bottom-left corner of the display</li>
      <li>A settings panel slides in — make your changes</li>
      <li>Click <strong>Save &amp; Update Display</strong> — takes effect instantly</li>
      <li>Settings are remembered on this device automatically</li>
    </ol></div>
    <div style="text-align:center;margin-top:32px;">
      <button class="btn-dl" onclick="doDownload()">⬇&nbsp;&nbsp;Download MemoryLUV</button>
      <div style="font-size:11px;color:var(--soft);margin-top:10px;font-family:'Josefin Sans',sans-serif;letter-spacing:.5px;">memorylv-${slug}.html</div>
    </div>`;}

  const bk=step>1?`<button class="btn" onclick="goBack()">← Back</button>`:`<div></div>`;
  const nx=step<TOTAL?`<button class="btn btn-primary" onclick="goNext()">Continue →</button>`:`<div></div>`;
  app.innerHTML=`<div class="progress">${dots}</div>${c}<div class="nav">${bk}${nx}</div>`;
}

function collect(){
  if(step===1){data.displayName=(document.getElementById('fn')||{}).value||'';data.zip=(document.getElementById('fz')||{}).value||'';}
  if(step===2){[0,1,2,3,4,5,6].forEach(i=>{const el=document.getElementById('fc'+i);if(el)data.caregivers[i]=el.value;});data.nightCaregiver=(document.getElementById('fni')||{}).value||'';}
  if(step===3){data.medMorning=(document.getElementById('fma')||{}).value||'08:00';data.medAfternoon=(document.getElementById('fmp')||{}).value||'13:00';data.medEvening=(document.getElementById('fme')||{}).value||'18:00';}
  if(step===4){data.appts=data.appts.map((_,i)=>({date:(document.getElementById('fad'+i)||{}).value||'',time:(document.getElementById('fat'+i)||{}).value||'',text:(document.getElementById('fax'+i)||{}).value||''}));}
}
function goNext(){collect();step=Math.min(step+1,TOTAL);render();}
function goBack(){collect();step=Math.max(step-1,1);render();}
function doDownload(){
  const html=genHTML(data);
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='memorylv-'+(data.displayName||'display').toLowerCase().replace(/\s+/g,'-')+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
render();
</script>
