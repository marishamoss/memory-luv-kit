*{margin:0;padding:0;box-sizing:border-box;}
:root{

  --rule:#B8D4E0;--ink:#1A2830;--ink-light:#4A6070;--soft:#7A9BAD;
}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--brand);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.hd-left{display:flex;align-items:baseline;gap:10px;}
.hd-wm{font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:4px;color:rgba(240,247,250,.42);text-transform:uppercase;}

.hd-right{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(240,247,250,.28);text-transform:uppercase;}

.prog{display:flex;gap:5px;margin-bottom:32px;}
.pd{flex:1;height:3px;border-radius:2px;background:var(--rule);transition:background .3s;}
.pd.done{background:var(--brand-mid);}
.pd.active{background:var(--honey);}
.slabel{font-family:'Josefin Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;color:var(--soft);text-transform:uppercase;margin-bottom:5px;}
.stitle{font-family:'Josefin Sans',sans-serif;font-size:24px;font-weight:600;letter-spacing:.3px;color:var(--brand);margin-bottom:6px;line-height:1.2;}
.stitle em{color:var(--honey);font-style:normal;}
.sdesc{font-size:13px;color:var(--ink-light);line-height:1.7;margin-bottom:22px;}
.field{margin-bottom:15px;}

.hint{font-size:11px;color:var(--soft);margin-top:3px;}
input[type=text],input[type=date],input[type=time]{width:100%;padding:9px 12px;border:1.5px solid var(--rule);border-radius:10px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:500;background:var(--bg);color:var(--ink);transition:border-color .2s,background .2s;}
input:focus{outline:none;border-color:var(--brand-mid);background:#fff;box-shadow:0 0 0 3px rgba(79,163,204,.10);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.subsec{font-family:'Josefin Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);margin:16px 0 8px;}
.sched{width:100%;border-collapse:separate;border-spacing:0 4px;}
.sched th{font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);padding:3px 6px;text-align:center;}
.sched th:first-child{text-align:left;padding-left:0;}
.sched td{padding:2px 4px;}
.sched td:first-child{font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:600;color:var(--ink-light);padding-left:0;min-width:36px;}
.sched select{width:100%;padding:7px 5px;border:1.5px solid var(--rule);border-radius:8px;font-family:'Quicksand',sans-serif;font-size:12px;background:var(--bg);color:var(--ink);}
.sched select:focus{outline:none;border-color:var(--brand-mid);}
.erow{display:grid;grid-template-columns:42px 1fr;gap:8px;margin-bottom:10px;align-items:start;}
.einput{padding:7px 4px;border:1.5px solid var(--rule);border-radius:10px;font-size:18px;text-align:center;background:var(--bg);width:100%;}
.einput:focus{outline:none;border-color:var(--brand-mid);}
.ehint{font-size:10px;color:var(--soft);margin-top:6px;line-height:1.6;padding:8px 12px;background:var(--honey-pale);border-radius:8px;border-left:2px solid var(--honey);}
.evblk{background:var(--bg);border-radius:12px;padding:13px 15px;margin-bottom:9px;border:1.5px solid var(--rule);}
.evnum{font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--brand-mid);margin-bottom:9px;}
/* Theme swatches in configurator */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px;}
.theme-swatch{border:2px solid var(--rule);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;transition:border-color .15s;}
.theme-swatch.selected{border-color:var(--brand-mid);}
.theme-swatch .tsw{height:36px;border-radius:6px;margin-bottom:6px;}
.theme-swatch .tsw-name{font-family:'Josefin Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink-light);}
.theme-swatch .tsw-heart{font-size:14px;margin-top:3px;}
/* Toggle switch */
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.toggle-row label{font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink-light);cursor:pointer;}
.toggle{position:relative;display:inline-block;width:38px;height:22px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--rule);transition:.2s;border-radius:22px;}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;transition:.2s;border-radius:50%;}
.toggle input:checked + .toggle-slider{background:var(--brand-mid);}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px);}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:20px;border-top:1.5px solid var(--rule);}
.btn{padding:10px 22px;border-radius:10px;font-family:'Josefin Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--rule);background:transparent;color:var(--ink-light);transition:all .15s;}
.btn:hover{background:var(--bg-muted);}
.btn-p{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn-p:hover{background:var(--brand-mid);}
.btn-dl{background:var(--honey);color:#fff;border:none;font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:13px 34px;border-radius:12px;cursor:pointer;}
.btn-dl:hover{background:var(--honey-light);}
.btn-sm{font-size:11px;padding:5px 13px;border-radius:7px;border:1.5px solid var(--rule);background:var(--bg-card);color:var(--brand);cursor:pointer;font-family:'Josefin Sans',sans-serif;font-weight:600;letter-spacing:.5px;}
.btn-sm:hover{background:var(--bg);}
.done-card{background:linear-gradient(135deg,var(--brand),var(--brand-mid));border-radius:16px;padding:26px;text-align:center;margin-bottom:18px;}
.done-card h3{font-family:'Josefin Sans',sans-serif;font-size:20px;font-weight:600;color:#fff;margin:10px 0 7px;}
.done-card p{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7;}
.instr{background:var(--bg);border-radius:12px;border:1.5px solid var(--rule);padding:13px 17px;margin-bottom:11px;}
.instr h4{font-family:'Josefin Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--brand);margin-bottom:8px;}
.instr ol{padding-left:18px;}
.instr li{font-size:13px;color:var(--ink-light);line-height:1.9;}
.instr li strong{color:var(--ink);}
.info-box{background:var(--honey-pale);border-left:3px solid var(--honey);border-radius:0 10px 10px 0;padding:11px 13px;font-size:12px;color:var(--ink-light);line-height:1.65;margin-top:10px;}

footer{background:var(--brand);padding:13px 32px;text-align:center;}
footer p{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(240,247,250,.28);}
footer span{color:var(--honey-light);}
</style>

      <div class="cfg-tsw" id="tsw-gray" onclick="setThemePanel('gray')"><div class="swb" style="background:#DDDBD5;"></div><div class="swn">Warm Gray</div><div class="swh">🧡</div></div>
      <div class="cfg-tsw" id="tsw-blush" onclick="setThemePanel('blush')"><div class="swb" style="background:#EDE0DA;"></div><div class="swn">Blush</div><div class="swh">💙</div></div>

        <div class="cf" style="margin:0;"><label>Person 4</label><input id="pt3" type="text" oninput="updSD()"/></div>

  </div>
  <div class="cs" id="sched-section"><div class="cst">Care Team Schedule</div>
    <div style="font-size:10px;color:#7A9BAD;margin-bottom:8px;">Day shift ends at 7 PM. Select who covers each shift.</div>
    <div id="p-sched"></div>
  </div>
  <div class="cs"><div class="cst">Medication reminders</div>
    <div class="cg3">
      <div class="cf"><label>Morning</label><input id="ma" type="time"/></div>
      <div class="cf"><label>Afternoon</label><input id="mp" type="time"/></div>
      <div class="cf"><label>Evening</label><input id="me" type="time"/></div>

    <div style="font-size:10px;color:#7A9BAD;margin-bottom:8px;">These appear in the "For Today" column every day.</div>

    <div id="p-events"></div>
    <button class="cadd" onclick="addEv()">+ Add event</button>
  </div>

  </div>
  <button class="csave" onclick="saveP()">Save &amp; Update Display</button>
  <div class="cnote">Changes take effect immediately and are saved to this device.</div>
</div></div>
<script>
var DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAY_ORD=[1,2,3,4,5,6,0];
var THEMES_D={
  sage: {
    day:'#d4dbc1',ri:'#c5cdb0',
    cg:'#4A1A6B',
    hd:'#7B47C0',he:'#3A7A50',hn:'#888',
    ov_bg:'rgba(212,219,193,.98)',card_bg:'#e8efd9'
  },
  gray: {
    day:'#DDDBD5',ri:'#CCCAC4',
    cg:'#7A3520',
    hd:'#C4703A',he:'#3A7A50',hn:'#888',
    ov_bg:'rgba(221,219,213,.98)',card_bg:'#E8E2D8'
  },
  blush:{
    day:'#EDE0DA',ri:'#E0D0C8',
    cg:'#1B3A5C',
    hd:'#3A6A9A',he:'#3A7A50',hn:'#888',
    ov_bg:'rgba(237,224,218,.98)',card_bg:'#EDE0DA'
  }
};
var SEED={
  displayName:"${ea(name)}",zip:"${ea(zip)}",
  selfCare:${d.selfCare||false},
  team:[${cgInit}],
  schedule:${schedJ},
  medMorning:"${d.medMorning}",medAfternoon:"${d.medAfternoon}",medEvening:"${d.medEvening}",
  prompts:${promptsJ},
  events:[${apInit}],
  theme:"${d.theme||'sage'}",textSize:"regular"
};
var C;
try{
  var _seed=JSON.parse(JSON.stringify(SEED));
  var _s=localStorage.getItem('luv_cfg');
  C=_s?Object.assign(_seed,JSON.parse(_s)):_seed;
}catch(e){C=JSON.parse(JSON.stringify(SEED));}
var HOLS=[
  {m:1,d:1,t:'Happy New Year!',e:'🎊',c:'#E8A840'},
  {m:1,d:20,t:'Happy MLK Jr. Day!',e:'✊🏾',c:'#800020'},
  {m:2,d:14,t:"Happy Valentine's Day!",e:'❤️',c:'#E31B23'},
  {m:3,d:17,t:"Happy St. Patrick's Day!",e:'🍀',c:'#135425'},
  {m:4,d:20,t:'Happy Easter!',e:'🐣',c:'#7A3870'},
  {m:5,d:11,t:"Happy Mother's Day!",e:'💐',c:'#D4537E'},
  {m:6,d:15,t:"Happy Father's Day!",e:'👔',c:'#2D6B8A'},
  {m:6,d:19,t:'Happy Juneteenth!',e:'🙌🏾',c:'#008000'},
  {m:7,d:4,t:'Happy Independence Day!',e:'🎆',c:'#B22234'},
  {m:10,d:31,t:'Happy Halloween!',e:'🎃',c:'#E8A840'},
  {m:11,d:27,t:'Happy Thanksgiving!',e:'🦃',c:'#7A4A2A'},
  {m:12,d:25,t:'Merry Christmas!',e:'🎄',c:'#165B33'}
];
var AF=null,AR=[],LR=Date.now();
var DS2=8,ES=18,NS=21,FD=3;

function applyTheme(themeKey){
  var th=THEMES_D[themeKey]||THEMES_D.sage;
  document.documentElement.style.setProperty('--day-bg',th.day);
  document.documentElement.style.setProperty('--day-ri',th.ri);
  document.documentElement.style.setProperty('--cg-color',th.cg);
  document.documentElement.style.setProperty('--ov-bg',th.ov_bg);
  document.documentElement.style.setProperty('--card-bg',th.card_bg);
}

function uMode(){
  var h=new Date().getHours(),b=document.body;
  b.classList.remove('day-mode','evening-mode','night-mode');
  h>=DS2&&h<ES?b.classList.add('day-mode'):h>=ES&&h<NS?b.classList.add('evening-mode'):b.classList.add('night-mode');
}

function getHeart(){
  var th=THEMES_D[C.theme||'sage']||THEMES_D.sage;
  var h=new Date().getHours();
  var col=h>=DS2&&h<ES?th.hd:h>=ES&&h<NS?th.he:th.hn;
  return '<span style="color:'+col+';font-size:0.85em;">\u2665</span>';
}

function uTime(){
  var n=new Date();
  document.getElementById('time').textContent=n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  document.getElementById('date').textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  uMode();dispCG();chkR();
  if(window.wc!==undefined)document.getElementById('wi').textContent=wInfo(window.wc).icon;
}

async function updW(){
  try{
    var loc=C.zip||'20904';
    var g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(loc)+'&count=1&language=en&format=json');
    var gd=await g.json();
    if(gd.results&&gd.results.length>0){
      var la=gd.results[0].latitude,lo=gd.results[0].longitude;
      var w=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto');
      var wd=await w.json();
      document.getElementById('temp').textContent=Math.round(wd.current.temperature_2m)+'°F';
      var wi=wInfo(wd.current.weather_code);
      document.getElementById('wi').textContent=wi.icon;
      document.getElementById('wd').textContent=wi.description;
      window.wc=wd.current.weather_code;
    }
  }catch(e){document.getElementById('wd').textContent='Weather unavailable';}
}

function wInfo(code){
  var isN=new Date().getHours()>=20||new Date().getHours()<6;
  var m={0:{icon:isN?'🌙':'☀️',description:'Clear sky'},1:{icon:isN?'🌙':'🌤️',description:'Mainly clear'},2:{icon:isN?'☁️':'⛅',description:'Partly cloudy'},3:{icon:'☁️',description:'Overcast'},45:{icon:'🌫️',description:'Foggy'},51:{icon:'🌦️',description:'Light drizzle'},61:{icon:'🌧️',description:'Light rain'},63:{icon:'🌧️',description:'Rain'},65:{icon:'🌧️',description:'Heavy rain'},71:{icon:'🌨️',description:'Light snow'},73:{icon:'🌨️',description:'Snow'},80:{icon:'🌦️',description:'Showers'},95:{icon:'⛈️',description:'Thunderstorm'}};
  return m[code]||{icon:isN?'🌙':'🌤️',description:'Unknown'};
}

function dispCG(){
  var now=new Date(),h=now.getHours(),dow=now.getDay();
  var isN=h>=19||h<7;
  var nd=dow;
  if(isN&&h<7){var y=new Date(now);y.setDate(y.getDate()-1);nd=y.getDay();}
  var el=document.getElementById('cgn');
  var heart=getHeart();
  if(C.selfCare){
    el.innerHTML='Take good care of yourself today '+heart;
  }else{
    var sched=C.schedule&&C.schedule[nd]?C.schedule[nd]:{d:0,n:0};
    var idx=isN?(sched.n||0):(sched.d||0);
    var nm=(C.team&&C.team[idx])||'';
    el.innerHTML=nm?nm+' is here '+(isN?'tonight':'today')+' '+heart:'Take good care of yourself today '+heart;
  }
}

function genR(){
  AR=[];
  var today=new Date(),dow=today.getDay();
  var ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  (C.events||[]).forEach(function(e){if(e.date===ds&&e.text)AR.push({time:e.time||'09:00',text:e.text,featured:true,icon:e.icon||'📋',sch:true});});
  [{t:C.medMorning||'08:00',x:'Morning medication'},{t:C.medAfternoon||'13:00',x:'Afternoon medication'},{t:C.medEvening||'18:00',x:'Evening medication'}]
    .forEach(function(r){AR.push({time:r.t,text:r.x,featured:true,icon:'💊',sch:false});});
  [{iv:60,s:'11:00',e:'17:00',x:'Take a drink of water',icon:'💧'},{iv:135,s:'12:45',e:'17:45',x:'Move your arms and legs',icon:'🤸'}]
    .forEach(function(r){
      var sh=parseInt(r.s.split(':')[0]),sm=parseInt(r.s.split(':')[1]);
      var eh=parseInt(r.e.split(':')[0]),em=parseInt(r.e.split(':')[1]);
      for(var m=sh*60+sm;m<=eh*60+em;m+=r.iv)
        AR.push({time:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'),text:r.x,featured:true,icon:r.icon,sch:false});
    });
  AR.sort(function(a,b){return a.time.localeCompare(b.time);});
  dispR();dispS();
}

function dispR(){
  var now=new Date(),ct=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var el=document.getElementById('rl');el.innerHTML='';
  var items=AR.filter(function(r){return r.sch;});
  if(!items.length){el.innerHTML='<div class="reminder-item">Nothing scheduled today</div>';return;}
  items.forEach(function(r){var d=document.createElement('div');d.className='reminder-item';if(r.time<ct)d.classList.add('past-event');d.innerHTML='<span class="reminder-time">'+r.icon+' '+f12(r.time)+'</span><span>'+r.text+'</span>';el.appendChild(d);});
}

function dispS(){
  var today=new Date(),mo=today.getMonth()+1,dy=today.getDate(),h=today.getHours();
  var el=document.getElementById('sl');el.innerHTML='';
  var all=[];
  var hol=HOLS.find(function(x){return x.m===mo&&x.d===dy;});
  if(hol)all.push({text:hol.t,icon:hol.e,color:(h>=21||h<8)?'#666':hol.c,isH:true});
  (C.prompts||[]).forEach(function(p){if(p.t)all.push({text:p.t,icon:p.i||''});});
  if(!all.length){el.innerHTML='<div class="reminder-item">Enjoy your day</div>';return;}
  all.slice(0,3).forEach(function(s){var d=document.createElement('div');d.className='reminder-item';var cs=s.isH?'style="color:'+s.color+';"':'';d.innerHTML='<span '+cs+'>'+(s.icon?s.icon+' ':'')+s.text+'</span>';el.appendChild(d);});
}

function f12(t){var h=parseInt(t.split(':')[0]),m=t.split(':')[1];return(h%12||12)+':'+m+' '+(h>=12?'PM':'AM');}

function chkR(){if(AF)return;var ct=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');var fr=AR.find(function(r){return r.time===ct&&r.featured;});if(fr)showF(fr);}

function chime(){try{var ac=new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(800,ac.currentTime);o.frequency.exponentialRampToValueAtTime(400,ac.currentTime+0.3);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.3);o.start(ac.currentTime);o.stop(ac.currentTime+0.3);}catch(e){}}

function showF(r){AF=r;var ov=document.getElementById('fo');document.getElementById('fi').textContent=r.icon;document.getElementById('ft').textContent=f12(r.time);document.getElementById('fx').textContent=r.text;ov.classList.add('active');chime();setTimeout(function(){ov.classList.remove('active');AF=null;dispR();},FD*60*1000);}

function chkRefresh(){var now=new Date(),h=now.getHours(),m=now.getMinutes();if(h===0&&m===0&&!AF){location.reload();return;}if(h>=8&&h<22&&Date.now()-LR>=15*60*1000&&!AF){LR=Date.now();location.reload();}}

/* ── Config panel ── */
function openP(){pop();document.getElementById('cfg-panel').classList.add('open');}
function closeP(){document.getElementById('cfg-panel').classList.remove('open');}

function setThemePanel(t){
  C.theme=t;
  applyTheme(t);
  ['sage','gray','blush'].forEach(function(k){var el=document.getElementById('tsw-'+k);if(el)el.classList.toggle('sel',k===t);});
}

function toggleSelfCare(){
  var chk=document.getElementById('sc-chk');
  if(!chk)return;
  C.selfCare=chk.checked;
  var fields=document.getElementById('care-team-fields');
  var sched=document.getElementById('sched-section');
  if(fields)fields.style.display=chk.checked?'none':'block';
  if(sched)sched.style.display=chk.checked?'none':'block';
}

function pop(){
  document.getElementById('pn').value=C.displayName||'';
  document.getElementById('pz').value=C.zip||'';
  var scChk=document.getElementById('sc-chk');
  if(scChk){scChk.checked=C.selfCare||false;toggleSelfCare();}
  [0,1,2,3].forEach(function(i){var el=document.getElementById('pt'+i);if(el)el.value=(C.team&&C.team[i])||'';});
  rSD();
  document.getElementById('ma').value=C.medMorning||'08:00';
  document.getElementById('mp').value=C.medAfternoon||'13:00';
  document.getElementById('me').value=C.medEvening||'18:00';
  rPr();
  rEv(C.events||[]);
  setThemePanel(C.theme||'sage');
  setSize(C.textSize||'regular');
}

function rSD(){
  var c=document.getElementById('p-sched');if(!c)return;
  var names=[0,1,2,3].map(function(i){var el=document.getElementById('pt'+i);return el?(el.value||'Person '+(i+1)):((C.team&&C.team[i])||'Person '+(i+1));});
  var h='<table class="cs-table"><thead><tr><th></th><th>Day</th><th>Night</th></tr></thead><tbody>';
  DAY_ORD.forEach(function(dow){
    var curD=C.schedule&&C.schedule[dow]?C.schedule[dow].d:0;
    var curN=C.schedule&&C.schedule[dow]?C.schedule[dow].n:0;
    var opts=names.map(function(n,i){return'<option value="'+i+'"'+(i==curD?' selected':'')+'>'+n+'</option>';}).join('');
    var opN=names.map(function(n,i){return'<option value="'+i+'"'+(i==curN?' selected':'')+'>'+n+'</option>';}).join('');
    h+='<tr><td>'+DAYS_S[dow]+'</td><td><select id="sd'+dow+'">'+opts+'</select></td><td><select id="sn'+dow+'">'+opN+'</select></td></tr>';
  });
  c.innerHTML=h+'</tbody></table>';
}

function updSD(){
  var names=[0,1,2,3].map(function(i){var el=document.getElementById('pt'+i);return el?(el.value||'Person '+(i+1)):'Person '+(i+1);});
  [0,1,2,3,4,5,6].forEach(function(dow){['sd','sn'].forEach(function(px){var sel=document.getElementById(px+dow);if(!sel)return;var cur=sel.value;sel.innerHTML=names.map(function(n,i){return'<option value="'+i+'"'+(i==cur?' selected':'')+'>'+n+'</option>';}).join('');});});
}

function rPr(){
  var c=document.getElementById('p-prompts');if(!c)return;
  var pr=C.prompts||[{i:'',t:''},{i:'',t:''},{i:'',t:''}];
  var h='';
  [0,1,2].forEach(function(i){var p=pr[i]||{i:'',t:''};h+='<div style="display:grid;grid-template-columns:38px 1fr;gap:6px;margin-bottom:7px;"><input type="text" id="ppi'+i+'" maxlength="2" value="'+(p.i||'')+'" placeholder="😊" style="padding:6px 3px;border:1px solid #B8D4E0;border-radius:7px;font-size:17px;text-align:center;background:#fff;width:100%;"><input type="text" id="ppt'+i+'" value="'+(p.t||'')+'" placeholder="Daily note or reminder…" style="padding:6px 8px;border:1px solid #B8D4E0;border-radius:7px;font-size:12px;font-family:inherit;background:#fff;width:100%;"></div>';});
  c.innerHTML=h;
}

function rEv(events){
  var c=document.getElementById('p-events');if(!c)return;
  var list=events.length?events:[{date:'',time:'',icon:'📋',text:''}];
  var h='';
  list.forEach(function(ev,i){h+='<div class="ca"><div class="can">Event '+(i+1)+'</div><div style="display:grid;grid-template-columns:38px 1fr 1fr;gap:5px;margin-bottom:5px;"><input type="text" id="evi'+i+'" maxlength="2" value="'+(ev.icon||'📋')+'" style="padding:5px 3px;border:1px solid #B8D4E0;border-radius:6px;font-size:15px;text-align:center;background:#fff;"><input type="date" id="evd'+i+'" value="'+(ev.date||'')+'" style="padding:5px 6px;border:1px solid #B8D4E0;border-radius:6px;font-size:11px;font-family:inherit;background:#fff;"><input type="time" id="evt'+i+'" value="'+(ev.time||'')+'" style="padding:5px 6px;border:1px solid #B8D4E0;border-radius:6px;font-size:11px;font-family:inherit;background:#fff;"></div><input type="text" id="evx'+i+'" value="'+(ev.text||'')+'" placeholder="e.g. Dr. Reilly at 3 PM, Family visit" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;"></div>';});
  c.innerHTML=h;
}

function addEv(){var c=document.getElementById('p-events');if(!c)return;var n=c.querySelectorAll('.ca').length;var div=document.createElement('div');div.className='ca';div.innerHTML='<div class="can">Event '+(n+1)+'</div><div style="display:grid;grid-template-columns:38px 1fr 1fr;gap:5px;margin-bottom:5px;"><input type="text" id="evi'+n+'" maxlength="2" value="📋" style="padding:5px 3px;border:1px solid #B8D4E0;border-radius:6px;font-size:15px;text-align:center;background:#fff;"><input type="date" id="evd'+n+'" style="padding:5px 6px;border:1px solid #B8D4E0;border-radius:6px;font-size:11px;font-family:inherit;background:#fff;"><input type="time" id="evt'+n+'" style="padding:5px 6px;border:1px solid #B8D4E0;border-radius:6px;font-size:11px;font-family:inherit;background:#fff;"></div><input type="text" id="evx'+n+'" placeholder="e.g. Family visit, Movie night" style="width:100%;padding:5px 8px;border:1px solid #B8D4E0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;">';c.appendChild(div);}

function saveP(){
  C.displayName=(document.getElementById('pn')||{}).value||'';
  C.zip=(document.getElementById('pz')||{}).value||'';
  var scChk=document.getElementById('sc-chk');C.selfCare=scChk?scChk.checked:false;
  C.team=[0,1,2,3].map(function(i){return(document.getElementById('pt'+i)||{}).value||'';});
  C.schedule={};
  [0,1,2,3,4,5,6].forEach(function(i){C.schedule[i]={d:parseInt((document.getElementById('sd'+i)||{}).value)||0,n:parseInt((document.getElementById('sn'+i)||{}).value)||0};});
  C.medMorning=(document.getElementById('ma')||{}).value||'08:00';
  C.medAfternoon=(document.getElementById('mp')||{}).value||'13:00';
  C.medEvening=(document.getElementById('me')||{}).value||'18:00';
  C.prompts=[0,1,2].map(function(i){return{i:(document.getElementById('ppi'+i)||{}).value||'',t:(document.getElementById('ppt'+i)||{}).value||''};});
  var n=document.querySelectorAll('.ca').length;
  C.events=Array.from({length:n},function(_,i){return{date:(document.getElementById('evd'+i)||{}).value||'',time:(document.getElementById('evt'+i)||{}).value||'',icon:(document.getElementById('evi'+i)||{}).value||'📋',text:(document.getElementById('evx'+i)||{}).value||''};}).filter(function(e){return e.date&&e.text;});
  try{localStorage.setItem('luv_cfg',JSON.stringify(C));}catch(e){}
  closeP();applyTheme(C.theme);genR();dispCG();updW();
}

function setSize(s){
  C.textSize=s;document.body.classList.toggle('large-print',s==='large');
  var reg=document.getElementById('ts-reg'),lg=document.getElementById('ts-lg');
  if(reg){reg.style.background=s==='regular'?'#2D6B8A':'#fff';reg.style.color=s==='regular'?'#F0F7FA':'#2D6B8A';reg.style.borderColor=s==='regular'?'#2D6B8A':'#B8D4E0';}
  if(lg){lg.style.background=s==='large'?'#2D6B8A':'#fff';lg.style.color=s==='large'?'#F0F7FA':'#2D6B8A';lg.style.borderColor=s==='large'?'#2D6B8A':'#B8D4E0';}
}

function init(){
  applyTheme(C.theme||'sage');
  uTime();updW();genR();dispCG();
  document.body.classList.toggle('large-print',(C.textSize||'regular')==='large');
  setInterval(uTime,1000);setInterval(chkRefresh,60000);setInterval(updW,30*60*1000);
  setInterval(function(){if(new Date().getHours()===0&&new Date().getMinutes()===0)genR();},60000);
}
window.addEventListener('load',init);
<\/script></body></html>`;
}

// ── Configurator ──────────────────────────────────────────────────────────
function updateConfigDropdowns(){
  const names=[0,1,2,3].map(i=>{const el=document.getElementById('ft'+i);return el?(el.value.trim()||'Person '+(i+1)):'Person '+(i+1);});
  DO.forEach(dow=>{['fsd','fsn'].forEach(px=>{const sel=document.getElementById(px+dow);if(!sel)return;const cur=sel.value;sel.innerHTML=names.map((n,i)=>'<option value="'+i+'"'+(i==cur?' selected':'')+'>'+n+'</option>').join('');});});
}

function toggleSelfCareConfig(){
  const chk=document.getElementById('fsc');
  if(!chk)return;
  data.selfCare=chk.checked;
  const fields=document.getElementById('fsc-fields');
  if(fields)fields.style.display=chk.checked?'none':'block';
}

function render(){
  const app=document.getElementById('app');
  const dots=Array.from({length:TOTAL},(_,i)=>`<div class="pd ${i+1<step?'done':i+1===step?'active':''}"></div>`).join('');
  let c='';

  if(step===1){
    c=`<div class="slabel">Step 1 of ${TOTAL}</div>
    <div class="stitle">About your loved one</div>
    <div class="sdesc">This personalizes the display. Zip code pulls live weather automatically every 30 minutes.</div>
    <div class="pill">✦ Built-in settings panel — update anytime, no code needed</div>
    <div class="field"><label>What should the display call them?</label><input type="text" id="fn" value="${ea(data.displayName)}" placeholder="Mom, Dorothy, Grandpa Joe"/><div class="hint">Appears in the caregiver greeting</div></div>
    <div class="field"><label>Home zip code (for weather)</label><input type="text" id="fz" value="${ea(data.zip)}" placeholder="e.g. 20904" maxlength="5"/></div>`;
  }

  if(step===2){
    const themeSwatches=Object.entries(THEMES).map(([k,v])=>`
      <div class="theme-swatch ${data.theme===k?'selected':''}" onclick="data.theme='${k}';render();">
        <div class="tsw" style="background:${v.day};"></div>
        <div class="tsw-name">${v.name}</div>
        <div class="tsw-heart" style="font-size:18px;">${v.heart_d}</div>
      </div>`).join('');

    c=`<div class="slabel">Step 2 of ${TOTAL}</div>
    <div class="stitle">Display theme</div>
    <div class="sdesc">Choose the daytime background. Evening and night modes are always dark to reduce light exposure.</div>
    <div class="theme-grid">${themeSwatches}</div>
    <div class="hint">The heart color in the caregiver greeting matches your theme.</div>`;
  }

  if(step===3){
    const wk=[1,2,3,4,5].map(i=>`<div><div style="font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);text-align:center;margin-bottom:4px;">${DS[i]}</div><input type="text" id="ft${i}" value="${ea(data.team[i]||'')}" placeholder="Name" style="text-align:center;padding:7px 4px;" oninput="updateConfigDropdowns()"/></div>`).join('');
    const we=[6,0].map(i=>`<div><div style="font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);text-align:center;margin-bottom:4px;">${DS[i]}</div><input type="text" id="ft${i}" value="${ea(data.team[i]||'')}" placeholder="Name" style="text-align:center;padding:7px 4px;" oninput="updateConfigDropdowns()"/></div>`).join('');
    const teamNames=data.team.map((t,i)=>t||'Person '+(i+1));
    const schedRows=DO.map(dow=>{
      const curD=data.schedule[dow]?data.schedule[dow].d:0;
      const curN=data.schedule[dow]?data.schedule[dow].n:0;
      const opts=teamNames.map((n,i)=>`<option value="${i}"${i===curD?' selected':''}>${n}</option>`).join('');
      const optsN=teamNames.map((n,i)=>`<option value="${i}"${i===curN?' selected':''}>${n}</option>`).join('');
      return `<tr><td>${DS[dow]}</td><td><select id="fsd${dow}" class="sched-sel">${opts}</select></td><td><select id="fsn${dow}" class="sched-sel">${optsN}</select></td></tr>`;
    }).join('');

    c=`<div class="slabel">Step 3 of ${TOTAL}</div>
    <div class="stitle">Care team</div>
    <div class="sdesc">Enter up to four caregivers and assign each day. Or toggle on if your loved one is self-caring.</div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="fsc" ${data.selfCare?'checked':''} onchange="toggleSelfCareConfig()"/><span class="toggle-slider"></span></label>
      <label for="fsc">I care for myself / no care team</label>
    </div>
    <div id="fsc-fields" style="display:${data.selfCare?'none':'block'};">
      <div class="subsec">Team members</div>
      <div class="g2">${[0,1,2,3].map(i=>`<div class="field" style="margin-bottom:10px;"><label>Person ${i+1}</label><input type="text" id="ft${i}" value="${ea(data.team[i]||'')}" placeholder="Caregiver name" oninput="updateConfigDropdowns()"/></div>`).join('')}</div>
      <div class="hint" style="margin-bottom:14px;">Leave unused slots blank.</div>
      <div class="subsec">Care team schedule</div>
      <table class="sched"><thead><tr><th></th><th>Day shift</th><th>Night shift</th></tr></thead><tbody>${schedRows}</tbody></table>
    </div>`;
  }

  if(step===4){
    const promptRows=[0,1,2].map(i=>{
      const p=data.prompts[i]||{i:'',t:''};
      return `<div class="erow"><input type="text" class="einput" id="fpi${i}" maxlength="2" value="${ea(p.i||'')}" placeholder="😊"/><input type="text" id="fpt${i}" value="${ea(p.t||'')}" placeholder="Daily note or reminder…"/></div>`;
    }).join('');
    c=`<div class="slabel">Step 4 of ${TOTAL}</div>
    <div class="stitle">Reminders &amp; prompts</div>
    <div class="sdesc">Set medication times and up to three daily prompts for the "For Today" column.</div>
    <div class="subsec">Medication reminders</div>
    <div class="g3">
      <div class="field"><label>Morning</label><input type="time" id="fma" value="${data.medMorning}"/></div>
      <div class="field"><label>Afternoon</label><input type="time" id="fmp" value="${data.medAfternoon}"/></div>
      <div class="field"><label>Evening</label><input type="time" id="fme" value="${data.medEvening}"/></div>
    </div>
    <div class="subsec">Daily prompts</div>
    ${promptRows}
    <div class="ehint">To add emoji — PC: ⊞ + .&nbsp; Mac: ⌘ Ctrl Space&nbsp; Mobile: long-press space bar</div>`;
  }

  if(step===5){
    const evRows=data.events.map((ev,i)=>`
      <div class="evblk">
        <div class="evnum">Event ${i+1}${ev.text?' — '+ev.text.slice(0,26)+(ev.text.length>26?'…':''):''}</div>
        <div class="g2" style="margin-bottom:8px;">
          <div class="field" style="margin-bottom:0;"><label>Date</label><input type="date" id="fed${i}" value="${ev.date||''}"/></div>
          <div class="field" style="margin-bottom:0;"><label>Time</label><input type="time" id="fet${i}" value="${ev.time||''}"/></div>
        </div>
        <div class="erow" style="margin-bottom:0;">
          <input type="text" class="einput" id="fei${i}" maxlength="2" value="${ev.icon||'📋'}" placeholder="📋"/>
          <input type="text" id="fex${i}" value="${ea(ev.text||'')}" placeholder="e.g. Dr. Reilly at 3 PM, Family visit…"/>
        </div>
      </div>`).join('');
    c=`<div class="slabel">Step 5 of ${TOTAL}</div>
    <div class="stitle">Events</div>
    <div class="sdesc">Appointments, visits, activities — anything with a date and time. These pop up full-screen when the time arrives. Add more anytime from the settings panel.</div>
    ${evRows}
    <div class="ehint" style="margin-top:4px;">To add emoji — PC: ⊞ + .&nbsp; Mac: ⌘ Ctrl Space&nbsp; Mobile: long-press space bar</div>`;
  }

  if(step===6){
    const slug=(data.displayName||'display').toLowerCase().replace(/\s+/g,'-');
    const pn=data.displayName||'your loved one';
    c=`<div class="done-card"><div style="font-size:38px;">💙</div>
      <h3>Ready for ${pn}</h3>
      <p>Your MemoryLUV display is personalized and ready.<br>Open in any browser, cast or mirror to a TV or monitor.</p>
    </div>
    <div class="instr"><h4>First-time setup</h4><ol>
      <li>Click Download — save the <strong>.html file</strong> anywhere on your computer</li>
      <li>Double-click it to open in Chrome or Edge</li>
      <li>Press <strong>F11</strong> (PC) or <strong>⌘ Ctrl F</strong> (Mac) for full screen</li>
      <li>Cast or mirror to your TV or monitor — runs and updates automatically 24/7</li>
    </ol></div>
    <div class="instr"><h4>Updating anytime</h4><ol>
      <li>Tap the <strong>⚙ Settings</strong> button in the bottom-left corner of the display</li>
      <li>Update caregivers, theme, medications, events, or prompts</li>
      <li>Tap <strong>Save &amp; Update Display</strong> — takes effect instantly</li>
    </ol></div>
    <div style="text-align:center;margin-top:28px;">
      <button class="btn-dl" onclick="doDownload()">⬇&nbsp;&nbsp;Download MemoryLUV</button>
      <div style="font-size:11px;color:var(--soft);margin-top:9px;font-family:'Josefin Sans',sans-serif;letter-spacing:.5px;">memorylv-${slug}.html</div>
    </div>`;
  }

  const bk=step>1?`<button class="btn" onclick="goBack()">← Back</button>`:`<div></div>`;
  const nx=step<TOTAL+1?`<button class="btn btn-p" onclick="goNext()">Continue →</button>`:`<div></div>`;
  app.innerHTML=`<div class="prog">${dots}</div>${c}<div class="nav">${bk}${nx}</div>`;
}

function collect(){
  if(step===1){data.displayName=(document.getElementById('fn')||{}).value||'';data.zip=(document.getElementById('fz')||{}).value||'';}
  if(step===3){
    const chk=document.getElementById('fsc');data.selfCare=chk?chk.checked:false;
    [0,1,2,3].forEach(i=>{const el=document.getElementById('ft'+i);if(el)data.team[i]=el.value;});
    DO.forEach(dow=>{data.schedule[dow]={d:parseInt((document.getElementById('fsd'+dow)||{}).value)||0,n:parseInt((document.getElementById('fsn'+dow)||{}).value)||0};});
  }
  if(step===4){
    data.medMorning=(document.getElementById('fma')||{}).value||'08:00';
    data.medAfternoon=(document.getElementById('fmp')||{}).value||'13:00';
    data.medEvening=(document.getElementById('fme')||{}).value||'18:00';
    data.prompts=[0,1,2].map(i=>({i:(document.getElementById('fpi'+i)||{}).value||'',t:(document.getElementById('fpt'+i)||{}).value||''}));
  }
  if(step===5){data.events=data.events.map((_,i)=>({date:(document.getElementById('fed'+i)||{}).value||'',time:(document.getElementById('fet'+i)||{}).value||'',icon:(document.getElementById('fei'+i)||{}).value||'📋',text:(document.getElementById('fex'+i)||{}).value||''}));}
}

function goNext(){collect();step=Math.min(step+1,TOTAL+1);render();}
function goBack(){collect();step=Math.max(step-1,1);render();}

function doDownload(){
  const html=genHTML(data);
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='memorylv-'+(data.displayName||'display').toLowerCase().replace(/\s+/g,'-')+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
render();
</script>
</body>
